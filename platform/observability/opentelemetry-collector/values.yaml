mode: deployment

replicaCount: 1

image:
  repository: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib

command:
  name: otelcol-k8s

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

ports:
  otlp:
    enabled: false
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    protocol: TCP
  jaeger-compact:
    enabled: false
  jaeger-thrift:
    enabled: false
  jaeger-grpc:
    enabled: false
  zipkin:
    enabled: false
  metrics:
    enabled: false
  prom-exp:
    enabled: true
    containerPort: 8889
    servicePort: 8889
    protocol: TCP

config:
  exporters:
    debug: null
    prometheus:
      endpoint: 0.0.0.0:8889
  extensions:
    health_check:
      endpoint: ${env:MY_POD_IP}:13133
  processors:
    memory_limiter:
      check_interval: 5s
      limit_mib: 192
      spike_limit_mib: 64
    batch: {}
  receivers:
    jaeger: null
    zipkin: null
    prometheus: null
    otlp:
      protocols:
        grpc: null
        http:
          endpoint: ${env:MY_POD_IP}:4318
  service:
    telemetry:
      resource:
        k8s.namespace.name: ${env:OTEL_K8S_NAMESPACE}
        k8s.node.name: ${env:OTEL_K8S_NODE_NAME}
        k8s.node.ip: ${env:OTEL_K8S_NODE_IP}
        k8s.pod.name: ${env:OTEL_K8S_POD_NAME}
        k8s.pod.ip: ${env:OTEL_K8S_POD_IP}
        host.name: ${env:OTEL_K8S_NODE_NAME}
      metrics:
        readers:
          - pull:
              exporter:
                prometheus:
                  host: ${env:MY_POD_IP}
                  port: 8888
    extensions:
      - health_check
    pipelines:
      logs: null
      traces: null
      metrics:
        receivers:
          - otlp
        processors:
          - memory_limiter
          - batch
        exporters:
          - prometheus
