apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pgweb
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/RizaSatya/homelab.git
    targetRevision: main
    path: apps/pgweb
  destination:
    server: https://kubernetes.default.svc
    namespace: database-tools
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
