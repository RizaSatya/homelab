apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: web-riza
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/RizaSatya/homelab.git
    targetRevision: main
    path: apps/web-riza
  destination:
    server: https://kubernetes.default.svc
    namespace: web-riza
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
